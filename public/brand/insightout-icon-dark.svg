<svg xmlns="http://www.w3.org/2000/svg" viewBox="245 215 640 430" role="img" aria-label="InsightOut logo">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.5" stop-color="#D9E7FD"/><stop offset="1" stop-color="#A9C9FB"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="speed" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#92BAFF"/><stop offset="1" stop-color="#3D7FF0"/></linearGradient>
    <filter id="float" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0B1B3A" flood-opacity="0.45"/></filter>
  </defs>

  <!-- icon -->
  <g id="icon" filter="url(#float)">
    <g fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2">
      <circle cx="320" cy="288" r="45"/>
      <rect x="283" y="352" width="74" height="268" rx="37"/>
      <path d="M 669.4,446 A 154,154 0 1 0 667.8,486 L 595.9,486 A 84,84 0 1 1 598.8,446 Z"/>
    </g>
    <!-- glassy sheen overlay -->
    <g fill="url(#sheen)" opacity="0.5">
      <circle cx="320" cy="288" r="45"/>
      <rect x="283" y="352" width="74" height="268" rx="37"/>
      <path d="M 669.4,446 A 154,154 0 1 0 667.8,486 L 595.9,486 A 84,84 0 1 1 598.8,446 Z"/>
    </g>
    <g id="speedlines" fill="url(#speed)">
    <rect x="674" y="416" width="56" height="13" rx="6"/>
    <rect x="674" y="444" width="104" height="13" rx="6"/>
    <rect x="788" y="444" width="13" height="13" rx="6"/>
    <rect x="600" y="463" width="108" height="14" rx="7"/>
    <rect x="667" y="490" width="80" height="13" rx="6"/>
    <rect x="754" y="490" width="15" height="13" rx="6"/>
    <rect x="669" y="515" width="50" height="12" rx="6"/>
    </g>
  </g>

  </svg>